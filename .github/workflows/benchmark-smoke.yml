# Benchmark smoke workflow for x64lens.
#
# Purpose:
#   Ensure the benchmark harness can execute without replacing the full
#   publication benchmark process. This workflow is a smoke test only.

name: benchmark-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'benchmarks/**'
      - 'Makefile'

jobs:
  bench-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binutils gcc make python3 time git curl unzip zip

      - name: Build
        run: make

      - name: Benchmark smoke test
        run: make bench-smoke
