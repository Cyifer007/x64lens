# CI workflow for x64lens.
#
# Purpose:
#   Verify that the repository scaffold, NASM build, and test suite work on
#   a clean Ubuntu runner. This is part of the reproducibility contract for
#   public research and future release engineering.

name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binutils gcc make python3 time git curl unzip zip

      - name: Repository contract checks
        run: |
          make scaffold-check
          make diagrams-check
          make public-docs-check
          make planning-docs-check

      - name: Build
        run: make

      - name: Test
        run: make test
